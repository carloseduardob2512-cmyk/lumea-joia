<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luméa Acessórios</title>
    <style>
        /* Variáveis de Cor */
        :root { 
            --rosa-lumea: #e3b2c1; 
            --rosa-escuro: #c9889b; 
            --branco: #ffffff; 
            --fundo: #faf9f6; 
            --texto: #5c5c5c; 
            --transicao: all 0.3s ease;
        }

        /* Estilos Gerais */
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--fundo); 
            color: var(--texto); 
            margin: 0; 
            line-height: 1.6;
        }

        /* Cabeçalho */
        header { 
            background-color: var(--rosa-lumea); 
            color: var(--branco); 
            text-align: center; 
            padding: 2rem 0; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            position: relative;
        }

        /* Botão Admin ESCONDIDO */
        .botao-admin-secreto {
            position: absolute;
            top: 10px;
            right: 15px;
            width: 25px;
            height: 25px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 12px;
            color: rgba(255,255,255,0.15);
            transition: var(--transicao);
        }
        .botao-admin-secreto:hover {
            color: rgba(255,255,255,0.4);
        }

        /* Botão Carrinho */
        .botao-carrinho {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 20px;
            cursor: pointer;
            color: var(--branco);
            transition: var(--transicao);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .botao-carrinho:hover {
            background: rgba(255,255,255,0.35);
            transform: scale(1.05);
        }
        .contador-carrinho {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4d4d;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Logo SVG integrado */
        .logo-site {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
            font-family: 'Georgia', serif;
            color: var(--branco);
        }

        .logo-icon {
            margin-bottom: 10px;
        }

        .logo-nome {
            font-size: 48px;
            font-weight: 300;
            margin: 0;
            letter-spacing: 2px;
        }

        .logo-separador {
            width: 80px;
            height: 1px;
            background-color: var(--branco);
            margin: 12px 0;
            position: relative;
        }
        .logo-separador::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            background: var(--branco);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
        }

        .logo-subtexto {
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0;
        }
        .logo-subtexto:last-child {
            font-size: 12px;
            letter-spacing: 6px;
            margin-top: 4px;
        }

        /* Container Principal */
        .container { 
            max-width: 1100px; 
            margin: 30px auto; 
            padding: 0 20px; 
        }

        /* Controles de Navegação e Filtro */
        .controles { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; 
            gap: 15px; 
            margin-bottom: 30px; 
        }

        .filtros { 
            display: flex; 
            gap: 15px; 
        }

        select, .btn-nav { 
            padding: 10px 20px; 
            border-radius: 20px; 
            border: 1px solid var(--rosa-lumea); 
            color: var(--rosa-escuro); 
            font-weight: bold; 
            cursor: pointer; 
            background: var(--branco);
            transition: var(--transicao);
        }

        select:hover, .btn-nav:hover { 
            background: #fff5f7; 
            transform: translateY(-2px); 
        }

        .btn-nav.ativo { 
            background: var(--rosa-escuro); 
            color: white; 
            border-color: var(--rosa-escuro); 
        }

        /* Grid do Catálogo */
        .catalogo-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 30px; 
        }

        .card { 
            background: var(--branco); 
            border-radius: 15px; 
            padding: 15px; 
            text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); 
            transition: var(--transicao);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 8px 25px rgba(227,178,193,0.2); 
        }

        .produto-imagem { 
            width: 100%; 
            height: 220px; 
            object-fit: cover; 
            border-radius: 10px; 
            margin-bottom: 15px; 
        }

        .produto-titulo { 
            font-size: 1.1rem; 
            margin: 10px 0 5px 0; 
            color: #444; 
        }

        .produto-preco { 
            font-size: 1.2rem; 
            font-weight: bold; 
            color: var(--rosa-escuro); 
            margin-bottom: 15px; 
        }

        .btn-acao { 
            background: var(--rosa-lumea); 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%;
            transition: var(--transicao);
        }

        .btn-acao:hover { 
            background: var(--rosa-escuro); 
        }

        .btn-acao:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Tela de Senha */
        #tela-senha {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .caixa-senha {
            background: var(--branco);
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .caixa-senha input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .botoes-senha {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-cancelar {
            background: #eee;
            color: var(--texto);
            width: auto;
        }

        /* Painel Carrinho */
        #painel-carrinho {
            position: fixed;
            top: 0;
            right: -420px;
            width: 90%;
            max-width: 400px;
            height: 100vh;
            background: var(--branco);
            box-shadow: -5px 0 20px rgba(0,0,0,0.1);
            transition: right 0.3s ease;
            z-index: 9998;
            display: flex;
            flex-direction: column;
        }
        #painel-carrinho.aberto {
            right: 0;
        }
        .cabecalho-carrinho {
            padding: 20px;
            background: var(--rosa-lumea);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-fechar {
            background: transparent;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        .itens-carrinho {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .item-carrinho {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            flex-wrap: wrap;
            gap: 10px;
        }
        .info-item { flex: 1 1 100%; }
        .info-item h4 { margin: 0 0 5px 0; font-size: 0.95rem; }
        .info-item p { margin: 0; font-weight: bold; color: var(--rosa-escuro); }
        .controle-quantidade {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 5px 0;
        }
        .btn-qtd {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 50%;
            background: var(--rosa-lumea);
            color: white;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .btn-qtd:hover { background: var(--rosa-escuro); }
        .btn-qtd:disabled { background: #ddd; cursor: not-allowed; }
        .qtd-texto { font-weight: bold; min-width: 20px; text-align: center; }
        .subtotal-item { font-size: 0.9rem; color: #666; margin-top: 5px; }
        .remover-item {
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
        }
        .total-carrinho {
            padding: 20px;
            border-top: 2px solid var(--rosa-lumea);
            background: #fffafc;
        }
        .valor-total {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--rosa-escuro);
            margin: 10px 0;
        }
        .btn-finalizar {
            background: #25d366;
            margin-top: 10px;
        }
        .btn-finalizar:hover {
            background: #1da851;
        }

        /* Painel Administrativo */
        #aba-admin { 
            display: none; 
            background: var(--branco); 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); 
        }
        #form-titulo { margin-bottom: 20px; }

        .form-grupo { 
            margin-bottom: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 5px; 
        }

        .form-grupo input, .form-grupo select { 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            width: 100%; 
            box-sizing: border-box; 
        }

        /* Upload de Imagem */
        .upload-arquivo {
            border: 2px dashed var(--rosa-lumea);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--transicao);
            background: #fffafc;
        }
        .upload-arquivo:hover {
            border-color: var(--rosa-escuro);
            background: #fff5f7;
        }
        .upload-arquivo input {
            display: none;
        }
        .preview-imagem {
            margin-top: 15px;
            max-width: 200px;
            max-height: 180px;
            border-radius: 8px;
            display: none;
            border: 1px solid #eee;
        }

        .tabela-admin { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 30px; 
        }

        .tabela-admin th, .tabela-admin td { 
            padding: 12px; 
            text-align: left; 
            border-bottom: 1px solid #eee; 
        }

        .tabela-admin th { 
            background: #fdf8f9; 
            color: var(--rosa-escuro); 
        }

        .btn-editar {
            background: #ffc107;
            color: #212121;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 5px;
            transition: var(--transicao);
        }
        .btn-editar:hover { background: #ffb300; }

        .btn-apagar { 
            background: #ff4d4d; 
            color: white; 
            border: none; 
            padding: 6px 12px; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: var(--transicao);
        }
        .btn-apagar:hover { 
            background: #cc0000; 
        }

        .aviso {
            padding: 10px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
        }
        .sucesso { background: #e6f9e6; color: #2d7d2d; }
        .erro { background: #ffebee; color: #c62828; }
    </style>
</head>
<body>
    <!-- Tela de Senha -->
    <div id="tela-senha">
        <div class="caixa-senha">
            <h3>Acesso Restrito</h3>
            <input type="password" id="input-senha" placeholder="Digite a senha de administração">
            <div class="botoes-senha">
                <button class="btn-acao" onclick="verificarSenha()">Entrar</button>
                <button class="btn-acao btn-cancelar" onclick="fecharSenha()">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Painel Carrinho -->
    <div id="painel-carrinho">
        <div class="cabecalho-carrinho">
            <h3>Meu Carrinho</h3>
            <button class="btn-fechar" onclick="fecharCarrinho()">×</button>
        </div>
        <div class="itens-carrinho" id="lista-carrinho">
            <p style="text-align: center; opacity: 0.6; margin-top: 30px;">Seu carrinho está vazio</p>
        </div>
        <div class="total-carrinho">
            <p>Total:</p>
            <div class="valor-total" id="valor-total">R$ 0,00</div>
            <button class="btn-acao btn-finalizar" id="btn-finalizar" onclick="enviarPedidoWpp()" disabled="true">Finalizar Compra no WhatsApp</button>
        </div>
    </div>

    <!-- Cabeçalho -->
    <header>
        <!-- Botão Carrinho -->
        <button class="botao-carrinho" onclick="abrirCarrinho()">
            🛒
            <span class="contador-carrinho" id="contador-carrinho">0</span>
        </button>

        <!-- Botão Admin ESCONDIDO -->
        <button class="botao-admin-secreto" onclick="abrirTelaSenha()">⚙</button>
        
        <!-- LOGO SVG DIRETO NO CÓDIGO (SEM LINKS EXTERNOS) -->
        <div class="logo-site">
            <svg class="logo-icon" width="90" height="70" viewBox="0 0 100 80" fill="white">
                <path d="M50 0 L55 10 L50 20 L45 10 Z" />
                <path d="M50 20 C 30 20, 20 40, 50 70 C 80 40, 70 20, 50 20" fill="none" stroke="white" stroke-width="2"/>
            </svg>
            <h1 class="logo-nome">Luméa</h1>
            <div class="logo-separador"></div>
            <p class="logo-subtexto">LAURA SCAPATICI</p>
            <p class="logo-subtexto">ACESSÓRIOS</p>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <div class="container">
        <!-- Barra de Controles -->
        <div class="controles">
            <div class="filtros">
                <button id="btn-loja" class="btn-nav ativo" onclick="mudarAba('catalogo')">Ver Loja</button>
            </div>
            
            <div id="filtro-categoria-container">
                <select id="filtro-categoria" onchange="filtrarProdutos()">
                    <option value="todos">Todas as Categorias</option>
                    <option value="brincos">Brincos</option>
                    <option value="colares">Colares</option>
                    <option value="aneis">Anéis</option>
                </select>
            </div>
        </div>

        <!-- Visão do Catálogo -->
        <div id="aba-catalogo">
            <div class="catalogo-grid" id="grid-produtos"></div>
        </div>

        <!-- Visão Administrativa -->
        <div id="aba-admin">
            <h2 id="form-titulo">Cadastrar Novo Produto</h2>
            <div id="aviso-sucesso" class="aviso sucesso">✅ Salvo com sucesso!</div>
            <div id="aviso-erro" class="aviso erro">❌ Erro ao salvar. Tente novamente.</div>
            
            <form id="form-produto" onsubmit="salvarProduto(event)">
                <input type="hidden" id="prod-id-edicao">
                <div class="form-grupo">
                    <label>Nome do Produto</label>
                    <input type="text" id="prod-nome" required>
                </div>
                <div class="form-grupo">
                    <label>Preço (R$)</label>
                    <input type="number" step="0.01" id="prod-preco" required>
                </div>
                <div class="form-grupo">
                    <label>Categoria</label>
                    <select id="prod-categoria" required>
                        <option value="brincos">Brincos</option>
                        <option value="colares">Colares</option>
                        <option value="aneis">Anéis</option>
                    </select>
                </div>
                <div class="form-grupo">
                    <label>Imagem do Produto</label>
                    <label class="upload-arquivo">
                        <input type="file" id="prod-imagem" accept="image/*" onchange="processarImagem(this)">
                        📷 Clique para selecionar da galeria (deixe vazio para manter a atual)
                    </label>
                    <img id="preview-img" class="preview-imagem" alt="Pré-visualização">
                </div>
                <div class="botoes-senha">
                    <button type="submit" class="btn-acao" style="width: auto;">Salvar</button>
                    <button type="button" class="btn-acao btn-cancelar" onclick="cancelarEdicao()">Cancelar</button>
                </div>
            </form>

            <table class="tabela-admin">
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Categoria</th>
                        <th>Preço</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo"></tbody>
            </table>
            <br>
            <button class="btn-acao btn-cancelar" onclick="sairAdmin()">Sair do Painel</button>
        </div>
    </div>

    <script>
        // ================= CONFIGURAÇÕES =================
        const SENHA_ADMIN = "lumea123"; // Senha mantida: lumea123
        const URL_APPSCRIPT = "https://script.google.com/macros/s/AKfycbyQFN7xNaLVlj7eRmNMN9_poZGtBTJ8i36Ewcme0-V2o1q4lHQOKJWQDngiTye36V2H/exec";
        const TELEFONE_WPP = "5517996604191"; // Coloque seu número com DDD sem espaços
        let imagemBase64 = "";
        let carrinho = JSON.parse(localStorage.getItem('lumea_carrinho')) || [];
        // ==================================================

        // Banco de dados no LocalStorage
        let produtos = JSON.parse(localStorage.getItem('lumea_produtos')) || [];

        // ========== SISTEMA DE CARRINHO COM QUANTIDADE ==========
        function atualizarCarrinho() {
            localStorage.setItem('lumea_carrinho', JSON.stringify(carrinho));
            const totalItens = carrinho.reduce((soma, item) => soma + item.quantidade, 0);
            document.getElementById('contador-carrinho').textContent = totalItens;
            
            const lista = document.getElementById('lista-carrinho');
            const totalEl = document.getElementById('valor-total');
            const btnFinalizar = document.getElementById('btn-finalizar');

            if (carrinho.length === 0) {
                lista.innerHTML = '<p style="text-align: center; opacity: 0.6; margin-top: 30px;">Seu carrinho está vazio</p>';
                totalEl.textContent = "R$ 0,00";
                btnFinalizar.disabled = true;
                return;
            }

            let totalGeral = 0;
            lista.innerHTML = carrinho.map((item, indice) => {
                const subtotal = item.preco * item.quantidade;
                totalGeral += subtotal;
                return `
                    <div class="item-carrinho">
                        <div class="info-item">
                            <h4>${item.nome}</h4>
                            <p>R$ ${Number(item.preco).toFixed(2)} cada</p>
                        </div>
                        <div class="controle-quantidade">
                            <button class="btn-qtd" onclick="alterarQuantidade(${indice}, -1)" ${item.quantidade <= 1 ? 'disabled' : ''}>−</button>
                            <span class="qtd-texto">${item.quantidade}</span>
                            <button class="btn-qtd" onclick="alterarQuantidade(${indice}, 1)">+</button>
                        </div>
                        <div class="subtotal-item">Subtotal: R$ ${subtotal.toFixed(2)}</div>
                        <button class="remover-item" onclick="removerDoCarrinho(${indice})">×</button>
                    </div>
                `;
            }).join('');

            totalEl.textContent = `R$ ${totalGeral.toFixed(2)}`;
            btnFinalizar.disabled = false;
        }

        function adicionarAoCarrinho(idProduto) {
            const produto = produtos.find(p => p.id === idProduto);
            if (!produto) return;
            
            const itemExistente = carrinho.find(item => item.id === idProduto);
            if (itemExistente) {
                itemExistente.quantidade += 1;
            } else {
                carrinho.push({
                    id: produto.id,
                    nome: produto.nome,
                    preco: produto.preco,
                    quantidade: 1
                });
            }
            atualizarCarrinho();
            alert(`${produto.nome} adicionado ao carrinho! 🛒`);
        }

        function alterarQuantidade(indice, delta) {
            carrinho[indice].quantidade += delta;
            if (carrinho[indice].quantidade < 1) carrinho[indice].quantidade = 1;
            atualizarCarrinho();
        }

        function removerDoCarrinho(indice) {
            carrinho.splice(indice, 1);
            atualizarCarrinho();
        }

        function abrirCarrinho() {
            document.getElementById('painel-carrinho').classList.add('aberto');
        }

        function fecharCarrinho() {
            document.getElementById('painel-carrinho').classList.remove('aberto');
        }

        function enviarPedidoWpp() {
            if (carrinho.length === 0) return;

            let mensagem = "Olá! Gostaria de pedir esses produtos:\n\n";
            let totalGeral = 0;

            carrinho.forEach((item, pos) => {
                const subtotal = item.preco * item.quantidade;
                mensagem += `${pos + 1}. ${item.nome} - ${item.quantidade}x R$ ${item.preco.toFixed(2)} = R$ ${subtotal.toFixed(2)}\n`;
                totalGeral += subtotal;
            });

            mensagem += `\nTotal do pedido: R$ ${totalGeral.toFixed(2)}`;
            const url = `https://wa.me/${TELEFONE_WPP}?text=${encodeURIComponent(mensagem)}`;
            window.open(url, '_blank');
        }

        // ========== SISTEMA DE SENHA ==========
        function abrirTelaSenha() {
            document.getElementById('tela-senha').style.display = 'flex';
            document.getElementById('input-senha').value = '';
        }
        function fecharSenha() {
            document.getElementById('tela-senha').style.display = 'none';
        }
        function verificarSenha() {
            const senha = document.getElementById('input-senha').value;
            if(senha === SENHA_ADMIN) {
                fecharSenha();
                mudarAba('admin');
            } else {
                alert("Senha incorreta!");
            }
        }
        function sairAdmin() {
            mudarAba('catalogo');
            cancelarEdicao();
        }

        // ========== UPLOAD E PRÉ-VISUALIZAÇÃO DE IMAGEM ==========
        function processarImagem(input) {
            const preview = document.getElementById('preview-img');
            if (input.files && input.files[0]) {
                const arquivo = input.files[0];
                
                if (arquivo.size > 1024 * 1024) {
                    alert("A imagem deve ter no máximo 1MB!");
                    input.value = "";
                    preview.style.display = "none";
                    imagemBase64 = "";
                    return;
                }

                const leitor = new FileReader();
                leitor.onload = function(e) {
                    imagemBase64 = e.target.result;
                    preview.src = imagemBase64;
                    preview.style.display = 'block';
                }
                leitor.readAsDataURL(arquivo);
            }
        }

        // Alternar visualizações
        function mudarAba(aba) {
            const catalogo = document.getElementById('aba-catalogo');
            const admin = document.getElementById('aba-admin');
            const filtro = document.getElementById('filtro-categoria-container');

            if (aba === 'catalogo') {
                catalogo.style.display = 'block';
                admin.style.display = 'none';
                filtro.style.display = 'block';
            } else {
                catalogo.style.display = 'none';
                admin.style.display = 'block';
                filtro.style.display = 'none';
            }
            renderizar();
        }

        function salvarDados() {
            localStorage.setItem('lumea_produtos', JSON.stringify(produtos));
        }

        // Enviar para Google Sheets
        async function enviarParaSheets(dados, acao = "salvar") {
            try {
                const resposta = await fetch(URL_APPSCRIPT, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ acao, dados })
                });
                return (await resposta.text()) === "Sucesso";
            } catch {
                return false;
            }
        }

        // Renderizar catálogo
        function renderizarCatalogo(lista) {
            const grid = document.getElementById('grid-produtos');
            if (lista.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; opacity: 0.6;">Nenhum produto encontrado.</p>';
                return;
            }
            grid.innerHTML = lista.map(p => `
                <div class="card">
                    <div>
                        <img src="${p.imagem}" alt="${p.nome}" class="produto-imagem" loading="lazy">
                        <h3 class="produto-titulo">${p.nome}</h3>
                        <p class="produto-preco">R$ ${Number(p.preco).toFixed(2)}</p>
                    </div>
                    <button class="btn-acao" onclick="adicionarAoCarrinho(${p.id})">Adicionar ao Carrinho</button>
                </div>
            `).join('');
        }

        // Renderizar tabela administrativa
        function renderizarTabela() {
            const corpo = document.getElementById('tabela-corpo');
            if (produtos.length === 0) {
                corpo.innerHTML = '<tr><td colspan="4" style="text-align: center; opacity: 0.6;">Nenhum produto cadastrado.</td></tr>';
                return;
            }
            corpo.innerHTML = produtos.map(p => `
                <tr>
                    <td>${p.nome}</td>
                    <td style="text-transform: capitalize;">${p.categoria}</td>
                    <td>R$ ${Number(p.preco).toFixed(2)}</td>
                    <td>
                        <button class="btn-editar" onclick="prepararEdicao(${p.id})">Editar</button>
                        <button class="btn-apagar" onclick="apagarProduto(${p.id})">Excluir</button>
                    </td>
                </tr>
            `).join('');
        }

        function filtrarProdutos() {
            const valor = document.getElementById('filtro-categoria').value;
            renderizarCatalogo(valor === 'todos' ? produtos : produtos.filter(p => p.categoria === valor));
        }

        // ========== FUNÇÕES DE EDIÇÃO ==========
        function prepararEdicao(id) {
            const produto = produtos.find(p => p.id === id);
            if (!produto) return;

            document.getElementById('form-titulo').textContent = "Editar Produto";
            document.getElementById('prod-id-edicao').value = id;
            document.getElementById('prod-nome').value = produto.nome;
            document.getElementById('prod-preco').value = produto.preco;
            document.getElementById('prod-categoria').value = produto.categoria;
            
            const preview = document.getElementById('preview-img');
            preview.src = produto.imagem;
            preview.style.display = 'block';
            imagemBase64 = "";

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelarEdicao() {
            document.getElementById('form-titulo').textContent = "Cadastrar Novo Produto";
            document.getElementById('form-produto').reset();
            document.getElementById('prod-id-edicao').value = "";
            document.getElementById('preview-img').style.display = 'none';
            imagemBase64 = "";
            document.querySelectorAll('.aviso').forEach(a => a.style.display = 'none');
        }

        // Salvar novo ou editar existente
        async function salvarProduto(e) {
            e.preventDefault();
            document.querySelectorAll('.aviso').forEach(a => a.style.display = 'none');

            const idEdicao = document.getElementById('prod-id-edicao').value;
            const dados = {
                nome: document.getElementById('prod-nome').value,
                preco: parseFloat(document.getElementById('prod-preco').value),
                categoria: document.getElementById('prod-categoria').value,
                imagem: imagemBase64 || null
            };

            let salvo;
            if (idEdicao) {
                const indice = produtos.findIndex(p => p.id === Number(idEdicao));
                if (indice === -1) return;
                
                produtos[indice].nome = dados.nome;
                produtos[indice].preco = dados.preco;
                produtos[indice].categoria = dados.categoria;
                if (dados.imagem) produtos[indice].imagem = dados.imagem;
                
                salvo = await enviarParaSheets({ ...produtos[indice] }, "editar");
            } else {
                if (!imagemBase64) {
                    alert("Selecione uma imagem primeiro!");
                    return;
                }
                const novo = {
                    id: Date.now(),
                    ...dados,
                    imagem: imagemBase64
                };
                produtos.push(novo);
                salvo = await enviarParaSheets(novo);
            }

            if (salvo) {
                salvarDados();
                cancelarEdicao();
                document.getElementById('aviso-sucesso').style.display = 'block';
            } else {
                document.getElementById('aviso-erro').style.display = 'block';
            }
            renderizar();
        }

        function apagarProduto(id) {
            if (confirm("Tem certeza que deseja excluir este produto?")) {
                produtos = produtos.filter(p => p.id !== id);
                salvarDados();
                renderizar();
            }
        }

        function renderizar() {
            salvarDados();
            renderizarCatalogo(produtos);
            renderizarTabela();
        }

        // Inicializa tudo
        atualizarCarrinho();
        renderizar();
    </script>
</body>
</html>
